<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Voice Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="app-shell">
        <section class="card">
            <header class="header">
                <h1>Python Voice Agent</h1>
                <div class="status">
                    <span id="statusDot" class="dot"></span>
                    <span id="statusText">Idle</span>
                </div>
            </header>

            <p class="subtitle">
                Speak or type a message. Replies are generated by the Flask backend and spoken by your browser.
            </p>

            <div id="chatBox" class="chat-box">
                <article class="message bot">
                    <strong>Agent:</strong> Hello! Start by typing or pressing "Start Listening".
                </article>
            </div>

            <div class="controls-row">
                <input id="messageInput" type="text" placeholder="Type your message..." autocomplete="off">
                <button id="sendBtn" class="btn btn-primary">Send</button>
            </div>

            <div class="controls-row">
                <button id="listenBtn" class="btn btn-danger">Start Listening</button>
                <button id="stopSpeechBtn" class="btn">Stop Speaking</button>
            </div>

            <p id="supportNote" class="support-note hidden">
                Speech recognition is not available in this browser. Use Chrome or Edge.
            </p>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
